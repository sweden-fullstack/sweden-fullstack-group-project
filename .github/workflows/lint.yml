name: Lint Check

on:
    pull_request:
    workflow_dispatch:
jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: "24"

            - name: Install dependencies
              run: npm ci

            # Yes these run on ALL the project files..... what a waste
            - name: ESLint Check
              run: npm run lint

            - name: Prettier Check
              run: npm run format:check
